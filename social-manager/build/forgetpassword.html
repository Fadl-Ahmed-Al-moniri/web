<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .spinner { display: none; } /* إخفاء مؤشر التحميل افتراضيًا */
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card p-4 shadow-sm" style="width: 350px;">
        <h2 class="text-center">Password recovery </h2>
        <p class="text-center text-muted">Enter your email to recover your account</p>
        
        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Enter your email address" required>
        </div>
        
        <button class="btn btn-primary w-100" onclick="submitEmail()" id="submitBtn">
            <span id="btnText">Nxet</span>
            <div class="spinner-border spinner-border-sm spinner" role="status">
                <span class="visually-hidden">Loading ...</span>
            </div>
        </button>
        <a href="login.html" class="d-block text-center mt-3 text-primary">العودة إلى تسجيل الدخول</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/forgetpassword.js"></script>
</body>
</html>
